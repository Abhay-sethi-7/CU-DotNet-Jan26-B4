<!DOCTYPE html>
<html>
<head>
<title>Sum Form</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="form.Js"></script>

</head>

<body class="bg-light">

<div class="container mt-5">
<div class="card p-4 shadow">

<h3 class="text-center mb-4">Sum of 2 Numbers</h3>

<div class="d-flex align-items-center gap-3">

<input type="text" id="num1" class="form-control" onblur="checkSum()">

<span class="fw-bold fs-4">+</span>

<input type="text" id="num2" class="form-control" onblur="checkSum()">

<span class="fw-bold fs-4">=</span>

<input type="text" id="result" class="form-control" readonly>

</div>

</div>
</div>

</body>
</html>
