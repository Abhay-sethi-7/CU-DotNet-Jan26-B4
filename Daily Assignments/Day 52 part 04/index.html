<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bootstrap Bulb Switch</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f8f9fa;
}

.bulb-img{
    width:200px;
}
</style>

</head>
<body>

<div class="container text-center">

    <h2 class="mb-4">Light Control</h2>

    <img id="bulb" src="bulb_off.png" class="bulb-img mb-4" alt="Bulb">

    <div class="form-check form-switch d-flex justify-content-center">
        <input class="form-check-input" type="checkbox" id="lightSwitch" style="transform:scale(1.8);">
    </div>

</div>

<script>

const bulb = document.getElementById("bulb");
const switchBtn = document.getElementById("lightSwitch");

switchBtn.addEventListener("change", function(){

    if(this.checked){
        bulb.src = "bulb_on.png";
    }
    else{
        bulb.src = "bulb_off.png";
    }

});

</script>

</body>
</html>
