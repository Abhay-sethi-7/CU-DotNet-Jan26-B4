<!DOCTYPE html>
<html>
<head>
<title>Loan Calculator</title>

<style>

body{
font-family: Arial, sans-serif;
background: black;
margin:0;
padding:40px;
text-align:center;
}

.container{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
max-width:1000px;
margin:auto;
}

h2{
color:#333;
margin-bottom:25px;
}

.form-row{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:25px;
flex-wrap:wrap;
}

.input-group{
display:flex;
flex-direction:column;
}

input{
padding:10px;
border-radius:8px;
border:1px solid #ccc;
width:160px;
transition:0.3s;
}

input:focus{
border-color:#4facfe;
box-shadow:0 0 8px rgba(79,172,254,0.6);
outline:none;
}



button{
background:#667eea;
color:white;
border:none;
padding:12px 40px;
font-size:16px;
border-radius:30px;
cursor:pointer;
transition:0.3s;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

button:hover{
transform:scale(1.05);
box-shadow:0 8px 20px rgba(0,0,0,0.3);
}



table{
width:100%;
border-collapse:collapse;
margin-top:30px;
overflow:hidden;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

td{
padding:10px;
text-align:right;
}

th{
background:#667eea;
color:white;
padding:12px;
text-align:right;
}

tr:nth-child(even){
background:#f2f2f2;
}

tr:hover{
background:#dfe9ff;
transition:0.3s;
}

</style>
</head>

<body>

<div class="container">

<h2>Loan EMI Calculator</h2>

<div class="form-row">

<div class="input-group">
<label>Loan Amount</label>
<input type="number" id="amount">
</div>

<div class="input-group">
<label>Interest Rate (%)</label>
<input type="number" id="rate">
</div>

<div class="input-group">
<label>Months</label>
<input type="number" id="months">
</div>

</div>

<button onclick="calculateEMI()">Calculate</button>

<table border="0">

<thead>
<tr>
<th>SNO</th>
<th>Loan Left</th>
<th>EMI</th>
<th>Principal</th>
<th>Interest</th>
<th>Remaining</th>
</tr>
</thead>

<tbody id="scheduleBody"></tbody>

</table>

</div>

<script>

function calculateEMI(){

let P = parseFloat(document.getElementById("amount").value);
let annualRate = parseFloat(document.getElementById("rate").value);
let months = parseFloat(document.getElementById("months").value);

let r = (annualRate/100)/12;

let emi = P * r * Math.pow((1+r),months) / (Math.pow((1+r),months)-1);

let balance = P;

let tbody = document.getElementById("scheduleBody");
tbody.innerHTML="";

for(let i=1;i<=months;i++){

let interest = balance * r;
let principal = emi - interest;
let remaining = balance - principal;

let row = `
<tr>
<td>${i}</td>
<td>${balance.toFixed(2)}</td>
<td>${emi.toFixed(2)}</td>
<td>${principal.toFixed(2)}</td>
<td>${interest.toFixed(2)}</td>
<td>${remaining.toFixed(2)}</td>
</tr>
`;

tbody.innerHTML += row;

balance = remaining;

}

}

</script>

</body>
</html>
